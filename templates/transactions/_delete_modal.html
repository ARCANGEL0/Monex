{% load humanize %}
<div class="modal-backdrop" id="modal-backdrop"
     x-data="{}"
     @click.self="$root.remove()"
     @keydown.escape.window="$root.remove()">
  <div class="modal" style="max-width: 400px;">
    <h3 class="modal__title" style="color: var(--red-glow); border-bottom-color: var(--red);">erase entry</h3>
    <button type="button" class="modal__close" @click="$root.remove()" aria-label="close">×</button>

    <p style="margin: 8px 0 12px;">delete <strong class="gold">{{ transaction.name }}</strong>?</p>
    <p class="dim mono" style="font-size: 0.82rem;">
      {{ currency_symbol }}{{ transaction.amount|floatformat:2|intcomma }} · {{ transaction.kind }} · {{ transaction.occurred_on|date:'d M Y' }}
    </p>
    <p class="dim" style="font-size: 0.72rem; margin-top: 14px;">// this cannot be undone.</p>

    <form method="post" hx-post="{{ submit_url }}" hx-target="#modal-backdrop" hx-swap="outerHTML">
      {% csrf_token %}
      <div class="modal__actions">
        <button type="button" class="btn btn--ghost" @click="$root.remove()">Cancel</button>
        <button type="submit" class="btn btn--danger">Confirm Erase</button>
      </div>
    </form>
  </div>
</div>
