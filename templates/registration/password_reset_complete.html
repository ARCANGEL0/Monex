{% load static %}<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MonEx [:RESET DONE:]</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/theme.css' %}">
  <link rel="stylesheet" href="{% static 'css/components.css' %}">
  <style>
    body { display: grid; place-items: center; min-height: 100vh; padding: 24px;
      background-color: var(--bg-0);
      background-image:
        radial-gradient(circle at 50% 50%, rgba(122, 154, 71, 0.12) 0%, transparent 55%),
        linear-gradient(0deg, transparent 50%, rgba(255,255,255,0.012) 50%);
      background-size: 100% 100%, 100% 3px;
      background-attachment: fixed, fixed;
    }
    .auth { max-width: 380px; width: 100%; background: var(--bg-1); border: 1px solid var(--green);
      padding: 36px 32px 28px; text-align: center;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 32px rgba(122, 154, 71, 0.4); }
    .auth__heading { font-family: var(--font-display); text-transform: uppercase; letter-spacing: 0.28em;
      color: var(--green-hot); margin: 0 0 6px; font-size: 1rem; text-shadow: 0 0 12px var(--green-hot); }
    .auth__sub { color: var(--text-muted); font-family: var(--font-mono);
      font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; margin: 8px 0 22px; }
  </style>
</head>
<body>
  <div class="auth">
    <h1 class="auth__heading">passcode set</h1>
    <div class="auth__sub">// reset complete</div>
    <a href="{% url 'accounts:login' %}" class="btn btn--primary" style="width:100%;justify-content:center;">Authenticate</a>
  </div>
</body>
</html>
