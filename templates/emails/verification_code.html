<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <![endif]-->
</head>
<body style="margin:0;padding:0;background:#0D0D0D;font-family:'Rajdhani','Segoe UI',Tahoma,Geneva,Verdana,sans-serif;">
  <!-- Grid background pattern -->
  <div style="position:fixed;top:0;left:0;right:0;bottom:0;background-image:linear-gradient(rgba(212,175,55,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(212,175,55,0.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0;"></div>
  
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#0D0D0D;">
    <tr><td align="center" style="padding:40px 16px;position:relative;z-index:2;">
      <table role="presentation" width="520" cellpadding="0" cellspacing="0">
        <!-- Top accent bar -->
        <tr><td style="height:2px;background:linear-gradient(90deg,transparent,#D4AF37,#FFD700,#D4AF37,transparent);"></td></tr>
        
        <!-- Main card with corner accents -->
        <tr>
          <td style="background:#141414;border-left:1px solid rgba(212,175,55,0.2);border-right:1px solid rgba(212,175,55,0.2);padding:0;position:relative;">
            <!-- Top-left corner bracket -->
            <div style="position:absolute;top:0;left:0;width:40px;height:40px;border-top:2px solid rgba(212,175,55,0.5);border-left:2px solid rgba(212,175,55,0.5);"></div>
            <!-- Top-right corner bracket -->
            <div style="position:absolute;top:0;right:0;width:40px;height:40px;border-top:2px solid rgba(212,175,55,0.5);border-right:2px solid rgba(212,175,55,0.5);"></div>
            
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
              <!-- Header section -->
              <tr>
                <td style="padding:32px 40px 20px;text-align:center;">
                  <!-- Hex logo -->
                  <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 auto 16px;">
                    <tr>
                      <td style="width:56px;height:56px;background:linear-gradient(135deg,rgba(212,175,55,0.15),rgba(212,175,55,0.05));border:1px solid rgba(212,175,55,0.4);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);text-align:center;vertical-align:middle;">
                        <span style="font-size:20px;font-weight:700;color:#D4AF37;font-family:'Orbitron',monospace;letter-spacing:2px;text-shadow:0 0 10px rgba(212,175,55,0.5);">M</span>
                      </td>
                    </tr>
                  </table>
                  <p style="margin:0;color:#707070;font-size:11px;letter-spacing:4px;text-transform:uppercase;font-family:'Orbitron',sans-serif;">MonEx · identity verification</p>
                  <div style="margin:14px auto 0;width:60%;height:1px;background:linear-gradient(90deg,transparent,rgba(212,175,55,0.3),transparent);"></div>
                </td>
              </tr>
              
              <!-- Code block with Sarif styling -->
              <tr>
                <td style="padding:0 40px;">
                  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border:1px solid rgba(212,175,55,0.3);background:linear-gradient(135deg,rgba(20,20,20,0.9) 0%,rgba(10,10,10,0.95) 100%);position:relative;">
                    <!-- Scan lines -->
                    <tr>
                      <td style="position:relative;">
                        <div style="position:absolute;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,206,209,0.02) 2px,rgba(0,206,209,0.02) 4px);pointer-events:none;"></div>
                        <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                          <tr>
                            <td style="padding:6px 0;background:linear-gradient(180deg,rgba(212,175,55,0.15) 0%,transparent 100%);height:2px;"></td>
                          </tr>
                          <tr>
                            <td style="padding:24px 16px 28px;text-align:center;">
                              <p style="margin:0 0 16px;color:#707070;font-size:12px;letter-spacing:3px;text-transform:uppercase;font-family:'Orbitron',sans-serif;">verification code</p>
                              <p style="margin:0;font-size:40px;font-weight:700;color:#D4AF37;font-family:'Orbitron',monospace;letter-spacing:12px;text-shadow:0 0 20px rgba(212,175,55,0.4);">
                                {{ code }}
                              </p>
                              <p style="margin:16px 0 0;color:#505050;font-size:11px;letter-spacing:2px;text-transform:uppercase;font-family:'Orbitron',sans-serif;">expires in 10 minutes</p>
                            </td>
                          </tr>
                          <tr>
                            <td style="height:2px;background:linear-gradient(180deg,transparent 0%,rgba(212,175,55,0.15) 100%);"></td>
                          </tr>
                        </table>
                      </td>
                    </tr>
                  </table>
                </td>
              </tr>
              
              <!-- Footer -->
              <tr>
                <td style="padding:28px 40px 36px;text-align:center;">
                  <div style="margin:0 auto;width:40%;height:1px;background:linear-gradient(90deg,transparent,rgba(212,175,55,0.2),transparent);"></div>
                  <p style="margin:16px 0 0;color:#505050;font-size:11px;line-height:1.6;font-family:'Rajdhani',sans-serif;">
                    if you didn't request this, ignore this email.<br>
                    <span style="color:#707070;letter-spacing:3px;text-transform:uppercase;font-size:10px;font-family:'Orbitron',sans-serif;">MonEx</span>
                  </p>
                </td>
              </tr>
            </table>
            
            <!-- Bottom-left corner bracket -->
            <div style="position:absolute;bottom:0;left:0;width:40px;height:40px;border-bottom:2px solid rgba(212,175,55,0.5);border-left:2px solid rgba(212,175,55,0.5);"></div>
            <!-- Bottom-right corner bracket -->
            <div style="position:absolute;bottom:0;right:0;width:40px;height:40px;border-bottom:2px solid rgba(212,175,55,0.5);border-right:2px solid rgba(212,175,55,0.5);"></div>
          </td>
        </tr>
        
        <!-- Bottom accent bar -->
        <tr><td style="height:2px;background:linear-gradient(90deg,transparent,#D4AF37,#FFD700,#D4AF37,transparent);"></td></tr>
        
        <!-- Status bar -->
        <tr>
          <td style="padding:8px 0;text-align:center;">
            <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 auto;">
              <tr>
                <td style="width:6px;height:6px;background:#D4AF37;border-radius:50%;box-shadow:0 0 6px rgba(212,175,55,0.6);display:inline-block;vertical-align:middle;"></td>
                <td style="padding-left:8px;color:#D4AF37;font-size:9px;letter-spacing:2px;text-transform:uppercase;font-family:'Orbitron',sans-serif;vertical-align:middle;">system ready</td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
