<div class="modal-backdrop" id="modal-backdrop"
     x-data="{}"
     @click.self="$root.remove()"
     @keydown.escape.window="$root.remove()">
  <div class="modal" style="max-width: 400px;">
    <h3 class="modal__title">reset passcode</h3>
    <button type="button" class="modal__close" @click="$root.remove()" aria-label="close">×</button>

    <p class="dim mono" style="font-size:0.78rem;margin:0 0 16px;">// we'll send a reset link to your email if an operator with that address exists.</p>

    <form method="post" hx-post="{% url 'accounts:forgot' %}" hx-target="#modal-backdrop" hx-swap="outerHTML">
      {% csrf_token %}

      <div class="field">
        <label class="field__label" for="id_email">email</label>
        <input type="email" name="email" id="id_email" class="input" required autocomplete="email" autofocus>
        {% if form.email.errors %}<div class="field__err">{{ form.email.errors|join:', ' }}</div>{% endif %}
      </div>

      <div class="modal__actions">
        <button type="button" class="btn btn--ghost" @click="$root.remove()">Cancel</button>
        <button type="submit" class="btn btn--primary">Send Reset Link</button>
      </div>
    </form>
  </div>
</div>
