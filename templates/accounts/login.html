{% load static %}<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>auth // adam</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/theme.css' %}">
  <link rel="stylesheet" href="{% static 'css/components.css' %}">
  <style>
    body { display: grid; place-items: center; min-height: 100vh; padding: 24px; }
    .auth {
      width: 100%; max-width: 380px;
      background: var(--bg-1);
      border: 1px solid var(--gold-dim);
      padding: 36px 32px 28px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6), var(--glow-gold);
      position: relative;
    }
    .auth::before {
      content: ''; position: absolute;
      top: -1px; left: -1px; right: -1px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold-hot), transparent);
    }
    .auth::after {
      content: ''; position: absolute;
      bottom: -1px; left: 20%; right: 20%;
      height: 1px;
      background: var(--gold-dim);
      opacity: 0.5;
    }
    .auth__logo {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, var(--gold-hot), var(--gold-dim));
      clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
      display: grid; place-items: center;
      color: var(--bg-0);
      font-family: var(--font-display);
      font-size: 1.7rem; font-weight: 700;
      margin: 0 auto 18px;
      box-shadow: var(--glow-gold);
    }
    .auth__heading {
      font-family: var(--font-display);
      text-transform: uppercase;
      letter-spacing: 0.32em;
      text-align: center;
      font-size: 1.05rem;
      color: var(--gold-hot);
      margin: 0;
    }
    .auth__sub {
      text-align: center;
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin: 6px 0 26px;
    }
    .auth__sub::before { content: '> '; color: var(--gold); }
    .auth__error {
      color: var(--red-glow);
      font-family: var(--font-display);
      letter-spacing: 0.15em;
      font-size: 0.72rem;
      text-transform: uppercase;
      border: 1px solid var(--red);
      padding: 8px 12px;
      margin-bottom: 14px;
      background: rgba(185,28,28,0.08);
    }
    .auth__hint {
      text-align: center;
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-top: 22px;
    }
  </style>
</head>
<body>
  <form class="auth" method="post" autocomplete="on">
    {% csrf_token %}
    <div class="auth__logo">A</div>
    <h1 class="auth__heading">Adam</h1>
    <div class="auth__sub">identify yourself</div>

    {% if form.errors %}
      <div class="auth__error">access denied. invalid credentials.</div>
    {% endif %}

    <div class="field">
      <label class="field__label" for="id_username">operator id</label>
      <input class="input" type="text" name="username" id="id_username" autocomplete="username" required autofocus>
    </div>
    <div class="field">
      <label class="field__label" for="id_password">passcode</label>
      <input class="input" type="password" name="password" id="id_password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn btn--primary" style="width:100%;justify-content:center;margin-top:6px;">Authenticate</button>
    <input type="hidden" name="next" value="{{ next }}">

    <div class="auth__hint">sarif // monex-tracker v0.1</div>
  </form>
</body>
</html>
