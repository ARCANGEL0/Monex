{% load static %}<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>auth // tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/theme.css' %}">
  <link rel="stylesheet" href="{% static 'css/components.css' %}">
  <style>
    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 24px;
      background-color: var(--bg-0);
      background-image:
        radial-gradient(circle at 50% 50%, rgba(232, 185, 35, 0.10) 0%, transparent 55%),
        radial-gradient(circle at 50% 100%, rgba(232, 185, 35, 0.06) 0%, transparent 60%),
        linear-gradient(0deg, transparent 50%, rgba(255,255,255,0.012) 50%),
        url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='60' height='52' viewBox='0 0 60 52'><polygon points='30,2 58,17 58,35 30,50 2,35 2,17' fill='none' stroke='%23c9a227' stroke-width='0.5' opacity='0.07'/></svg>");
      background-size: 100% 100%, 100% 100%, 100% 3px, 60px 52px;
      background-attachment: fixed, fixed, fixed, fixed;
      background-repeat: no-repeat, no-repeat, repeat, repeat;
    }
    .auth {
      width: 100%;
      max-width: 380px;
      background: var(--bg-1);
      border: 1px solid var(--gold-dim);
      padding: 36px 32px 28px;
      position: relative;
      animation: auth-aura 4s ease-in-out infinite;
    }
    @keyframes auth-aura {
      0%, 100% { box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 24px rgba(232, 185, 35, 0.3); }
      50% { box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 50px rgba(252, 211, 77, 0.55); }
    }
    .auth::before {
      content: "";
      position: absolute;
      top: -1px; left: -1px; right: -1px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold-hot), transparent);
      box-shadow: 0 0 12px var(--gold-hot);
    }
    .auth::after {
      content: "";
      position: absolute;
      bottom: -1px; left: 20%; right: 20%;
      height: 1px;
      background: var(--gold-hot);
      filter: drop-shadow(0 0 6px var(--gold-hot));
      opacity: 0.7;
    }
    .auth__logo {
      width: 64px; height: 64px;
      display: block;
      margin: 0 auto 18px;
      filter: drop-shadow(0 0 18px rgba(252, 211, 77, 0.7));
      animation: logo-pulse 3.4s ease-in-out infinite;
    }
    @keyframes logo-pulse {
      0%, 100% { filter: drop-shadow(0 0 12px rgba(232, 185, 35, 0.5)); }
      50% { filter: drop-shadow(0 0 26px rgba(252, 211, 77, 0.95)); }
    }
    .auth__sub {
      text-align: center;
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      margin: 0 0 26px;
    }
    .auth__sub::before { content: "> "; color: var(--gold-hot); text-shadow: 0 0 8px var(--gold-hot); }
    .auth__error {
      color: var(--red-glow);
      font-family: var(--font-display);
      letter-spacing: 0.15em;
      font-size: 0.72rem;
      text-transform: uppercase;
      border: 1px solid var(--red);
      padding: 8px 12px;
      margin-bottom: 14px;
      background: rgba(185,28,28,0.08);
      box-shadow: 0 0 14px rgba(220, 38, 38, 0.25);
    }
    .auth__hint {
      text-align: center;
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-top: 22px;
    }
  </style>
</head>
<body>
  <form class="auth" method="post" autocomplete="on">
    {% csrf_token %}
    <svg class="auth__logo" viewBox="0 0 40 40" aria-hidden="true">
      <defs>
        <linearGradient id="logo-grad-auth" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#fcd34d"/>
          <stop offset="100%" stop-color="#6e5614"/>
        </linearGradient>
      </defs>
      <polygon points="20,2 36,11 36,29 20,38 4,29 4,11" fill="url(#logo-grad-auth)"/>
      <polygon points="20,8 31,14.5 31,25.5 20,32 9,25.5 9,14.5" fill="#0a0a0a"/>
      <polygon points="20,14 25.5,17.25 25.5,22.75 20,26 14.5,22.75 14.5,17.25" fill="#fcd34d"/>
    </svg>
    <div class="auth__sub">identify yourself</div>

    {% if form.errors %}
      <div class="auth__error">access denied. invalid credentials.</div>
    {% endif %}

    <div class="field">
      <label class="field__label" for="id_username">operator id</label>
      <input class="input" type="text" name="username" id="id_username" autocomplete="username" required autofocus>
    </div>
    <div class="field">
      <label class="field__label" for="id_password">passcode</label>
      <input class="input" type="password" name="password" id="id_password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn btn--primary" style="width:100%;justify-content:center;margin-top:6px;">Authenticate</button>
    <input type="hidden" name="next" value="{{ next }}">

    <div class="auth__hint">sarif // tracker v0.1</div>
  </form>
</body>
</html>
