<aside class="sidebar" :class="menu && 'sidebar--open'">
  <div class="sidebar__brand">
    <svg class="sidebar__logo" viewBox="0 0 40 40" aria-hidden="true">
      <defs>
        <linearGradient id="logo-grad-side" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#fcd34d"/>
          <stop offset="100%" stop-color="#6e5614"/>
        </linearGradient>
      </defs>
      <polygon points="20,2 36,11 36,29 20,38 4,29 4,11" fill="url(#logo-grad-side)"/>
      <polygon points="20,8 31,14.5 31,25.5 20,32 9,25.5 9,14.5" fill="#0a0a0a"/>
      <polygon points="20,14 25.5,17.25 25.5,22.75 20,26 14.5,22.75 14.5,17.25" fill="#fcd34d"/>
    </svg>
    <div class="sidebar__title">
      {{ request.user.username|default:"operator" }}
      <small>MonEx tracker</small>
    </div>
  </div>
  <nav class="sidebar__nav">
    <a href="#" class="nav-item nav-item--active"
       hx-get="/_/d/" hx-target="#content" hx-push-url="false"
       @click="menu = false"
       id="nav-dashboard">
      <span class="nav-item__icon">◆</span> Dashboard
    </a>
    <a href="#" class="nav-item"
       hx-get="/_/t/" hx-target="#content" hx-push-url="false"
       @click="menu = false"
       id="nav-transactions">
      <span class="nav-item__icon">≡</span> Transactions
    </a>
    <a href="#" class="nav-item"
       hx-get="/_/a/" hx-target="#content" hx-push-url="false"
       @click="menu = false"
       id="nav-analytics">
      <span class="nav-item__icon">▲</span> Analytics
    </a>
    <a href="#" class="nav-item"
       hx-get="/_/r/" hx-target="#content" hx-push-url="false"
       @click="menu = false"
       id="nav-recurring">
      <span class="nav-item__icon">↻</span> Recurring
    </a>
    <a href="#" class="nav-item"
       hx-get="/_/s/" hx-target="#content" hx-push-url="false"
       @click="menu = false"
       id="nav-settings">
      <span class="nav-item__icon">⚙</span> Settings
    </a>
  </nav>
  <div class="sidebar__foot">
    {% if request.user.is_authenticated %}
      <div class="op-wrap" x-data="{ open: false }">
        <button type="button" class="op-trigger" :class="open && 'op-trigger--open'" @click="open = !open">
          <span class="live-dot"></span>
          operator: <span class="gold">{{ request.user.username }}</span>
          <span class="op-trigger__chev" :class="open && 'op-trigger__chev--open'">▾</span>
        </button>
        <div x-show="open" x-cloak @click.outside="open = false" class="op-menu">
          <a style="justify-content: center;" href="#" class="btn btn--ghost btn--sm op-menu__item"
             hx-get="{% url 'accounts:passcode' %}"
             hx-target="#modal-slot"
             hx-swap="innerHTML"
             @click="open = false">Change Passcode</a>
          <form method="post" action="{% url 'accounts:logout' %}" style="margin:0;">
            {% csrf_token %}
            <button type="submit" class="btn btn--danger btn--sm op-menu__item" style="width:100%;justify-content:center;">Disconnect</button>
          </form>
        </div>
      </div>
    {% endif %}
    <div class="sidebar__build"> <a style="color: inherit" href="https://arcangelo.net"> 
       develoed by: ARCANGELO
         </a> 
   </div>
  </div>
</aside>

<script>
  function setActiveNav(path) {
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('nav-item--active'));
    const map = { '/_/d/': 'nav-dashboard', '/_/t/': 'nav-transactions', '/_/a/': 'nav-analytics', '/_/r/': 'nav-recurring', '/_/s/': 'nav-settings' };
    const id = map[path];
    if (id) document.getElementById(id)?.classList.add('nav-item--active');
  }
  document.body.addEventListener('htmx:afterSwap', function(e) {
    if (e.detail.target.id === 'content') {
      setActiveNav(e.detail.requestConfig.path);
    }
  });
</script>
