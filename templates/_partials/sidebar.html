<aside class="sidebar" :class="menu && 'sidebar--open'">
  <div class="sidebar__brand">
    <svg class="sidebar__logo" viewBox="0 0 40 40" aria-hidden="true">
      <defs>
        <linearGradient id="logo-grad-side" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#fcd34d"/>
          <stop offset="100%" stop-color="#6e5614"/>
        </linearGradient>
      </defs>
      <polygon points="20,2 36,11 36,29 20,38 4,29 4,11" fill="url(#logo-grad-side)"/>
      <polygon points="20,8 31,14.5 31,25.5 20,32 9,25.5 9,14.5" fill="#0a0a0a"/>
      <polygon points="20,14 25.5,17.25 25.5,22.75 20,26 14.5,22.75 14.5,17.25" fill="#fcd34d"/>
    </svg>
    <div class="sidebar__title">
      {{ request.user.username|default:"operator" }}
      <small>tracker</small>
    </div>
  </div>
  <nav class="sidebar__nav">
    <a href="/" class="nav-item {% if request.path == '/' %}nav-item--active{% endif %}">
      <span class="nav-item__icon">◆</span> Dashboard
    </a>
    <a href="/transactions/" class="nav-item {% if '/transactions' in request.path %}nav-item--active{% endif %}">
      <span class="nav-item__icon">≡</span> Transactions
    </a>
    <a href="/analytics/" class="nav-item {% if '/analytics' in request.path %}nav-item--active{% endif %}">
      <span class="nav-item__icon">▲</span> Analytics
    </a>
    <a href="/recurring/" class="nav-item {% if '/recurring' in request.path %}nav-item--active{% endif %}">
      <span class="nav-item__icon">↻</span> Recurring
    </a>
    <a href="/settings/" class="nav-item {% if '/settings' in request.path %}nav-item--active{% endif %}">
      <span class="nav-item__icon">⚙</span> Settings
    </a>
  </nav>
  <div class="sidebar__foot">
    {% if request.user.is_authenticated %}
      <div class="sidebar__operator">
        <span class="live-dot"></span> operator: {{ request.user.username }}
      </div>
      <form method="post" action="/accounts/logout/">
        {% csrf_token %}
        <button type="submit" class="btn btn--ghost btn--sm" style="width:100%;justify-content:center;">Disconnect</button>
      </form>
    {% endif %}
    <div class="sidebar__build">v0.1 / sarif-os</div>
  </div>
</aside>
